<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        /* Navbar */
        .navbar {
            background-color: black;
            border-bottom: 1px solid #ccc;
            border-radius: 0;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 28px;
        }

        .navbar-nav .nav-item .nav-link {
            color: white;
            font-size: 14px;
        }

        .navbar-nav .nav-item .nav-link:hover {
            color: orange;
        }

        
        .container-form {
            margin-top: 40px;
        }

      
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="#">Parent Dashboard</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">



                    <li class="nav-item">
                        <a class="nav-link" href="parent_dashboard">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/change_password">Change Password</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/manage_child_data">Manage Child Data</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="book_appointment">Book Appointment</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="view_appointments">View Appointments</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

   <!-- Change Password Form with Box -->
<div class="container container-form">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border border-dark"> <!-- Add a card wrapper -->
                <div class="card-body"> <!-- Add a card-body wrapper -->
                    <h2 class="mb-4">Change Password</h2>
                    <form id="changePasswordForm" action="/change_password" method="post">
                        <div class="form-group">
                            <label for="oldPassword">Old Password</label>
                            <input type="password" class="form-control" id="oldPassword" name="oldPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" class="form-control" id="newPassword" name="newPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Change Password</button>
                    </form>
                </div> <!-- End of card-body -->
            </div> <!-- End of card -->
        </div>
    </div>
</div>
<br><br>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#changePasswordForm').submit(function(e) {
                e.preventDefault(); // Prevent the form from submitting normally
                
                // Send the form data to the server using AJAX
                $.ajax({
                    type: 'POST',
                    url: '/change_password',
                    data: $('#changePasswordForm').serialize(), // Serialize the form data
                    success: function(response) {
                        // Show the success message in a Bootstrap modal
                        $('#successModal').modal('show');
    
                        // Redirect to the profile page after a delay
                        setTimeout(function() {
                            window.location.href = response.redirect;
                        }, response.delay * 1000); // Convert delay from seconds to milliseconds
                    },
                    error: function(xhr, status, error) {
                        // Show an error message
                        alert('Password did not match: ' + error);
                    }
                });
            });
        });
    </script>
    

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" role="dialog" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">Success</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    Password changed successfully.
                </div>
            </div>
        </div>
    </div>

</body>
</html>
