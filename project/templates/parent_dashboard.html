<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Custom CSS -->
    <style>
        /* Navbar */
        .navbar {
            background-color: black;
            border-bottom: 1px solid #ccc;
            border-radius: 0;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 28px;
        }

        .navbar-nav .nav-item .nav-link {
            color: white;
            font-size: 14px;
        }

        .navbar-nav .nav-item .nav-link:hover {
            color: orange;
        }

        .details-box {
            border: 2px solid black;
            border-radius: 10px;
            padding: 20px;
            margin-top: 100px;
            width: 600px;
        }

    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="#">Parent Dashboard</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/parent_dashboard">Profile</a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" href="/change_password">Change Password</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/manage_child_data">Manage Child Data</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/book_appointment">Book Appointment</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/view_appointments">View Appointments</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">
    <div class="details-box" style="margin-left: 170px;">
        <h2 style="text-align: center;">Welcome to Parent dashboard</h2><br><br>
        <p style="margin-left: 200px;"><strong>Username:</strong> {{ user_details['name'] }}</p>
        <p style="margin-left: 200px;"><strong>Email:</strong> {{ user_details['email'] }}</p>
        <p style="margin-left: 200px;"><strong>Number:</strong> {{ user_details['number'] }}</p>
    </div>
</div>

<!-- Include jQuery library -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<!-- Font Awesome JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>

</body>
</html>
